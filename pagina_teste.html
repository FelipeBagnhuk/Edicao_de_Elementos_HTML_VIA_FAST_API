<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Seu Projeto</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            line-height: 1.6;
            color: #333;
            max-width: 800px;
            margin: 0 auto;
            padding: 20px;
            background: #f8f9fa;
        }

        .container {
            background: white;
            border-radius: 12px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.1);
            overflow: hidden;
            margin: 20px 0;
        }

        .imagem {
            width: 100%;
            height: 250px;
            object-fit: cover;
        }

        .conteudo {
            padding: 30px;
        }

        .titulo {
            font-size: 2em;
            font-weight: 700;
            color: #1a1a1a;
            margin-bottom: 15px;
            line-height: 1.2;
        }

        .texto {
            font-size: 1.1em;
            color: #555;
            margin-bottom: 20px;
        }

        @media (max-width: 600px) {
            body { padding: 10px; }
            .conteudo { padding: 20px; }
            .titulo { font-size: 1.5em; }
        }
    </style>
</head>
<body>
    <div class="container">
        <img src="sua-imagem-aqui.jpg" alt="Descrição da imagem" class="imagem">
        <div class="conteudo">
            <h1 class="titulo">Título do Seu Conteúdo</h1>
            <p class="texto">
                Aqui vai o texto do seu projeto. Você pode adicionar quantas linhas quiser, 
                o layout se adapta automaticamente. É só trocar a imagem, título e texto!
            </p>
        </div>
    </div>
</body>
</html>
